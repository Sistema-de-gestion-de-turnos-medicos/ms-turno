server:
  port: ${PORT:8086}
  forward-headers-strategy: framework

spring:
  application:
    name: ms-turno


  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/service_turno_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Duoc.2026}
    driver-class-name: org.postgresql.Driver


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000

logging:
  level:
    SistemasDeGestionDeTurnosMedico.msturno: DEBUG
    org.springframework.security: DEBUG

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html


eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
