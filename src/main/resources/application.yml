server:
  port: 8086

spring:
  application:
    name: ms-turno
  datasource:
    url: jdbc:mariadb://localhost:3306/service_turno_db
    username: root
    password: 123
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000

logging:
  level:
    com.medical.turno: DEBUG
    org.springframework.security: DEBUG

services:
  medico-service:
    url: http://localhost:8087

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

---

spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: ${DB_URL:jdbc:mariadb://mysql-turno:3306/service_turno_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123}
    driver-class-name: org.mariadb.jdbc.Driver

server:
  port: ${PORT:8086}

services:
  medico-service:
    url: ${MEDICO_SERVICE_URL:http://ms-medico:8087}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
